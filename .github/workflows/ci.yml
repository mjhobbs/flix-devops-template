# Testing the github action secrets

name: CI/CD Pipeline

on:
  push:
    branches: [ 'main' ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd services/video-service && npm install || true
          cd ../../gateway && npm install || true
          cd ../../frontend && npm install || true

      - name: Build Docker images
        run: docker compose build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push gateway image
        uses: docker/build-push-action@v5
        with:
          context: ./gateway
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push video-service image
        uses: docker/build-push-action@v5
        with:
          context: ./services/video-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/video-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push history-service image
        uses: docker/build-push-action@v5
        with:
          context: ./services/history-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/history-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push user-service image
        uses: docker/build-push-action@v5
        with:
          context: ./services/user-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/user-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep infrastructure
        uses: azure/cli@v1
        with:
          inlineScript: |
            az deployment sub create \
              --name flix-deploy-$(date +%s) \
              --location westus \
              --template-file infra/deploy.bicep \
              --parameters environment=prod

      - name: Deploy frontend to App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: app-flix-frontend-prod-${{ secrets.DEPLOYMENT_ID }}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:latest

      - name: Deploy gateway to App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: app-flix-gateway-prod-${{ secrets.DEPLOYMENT_ID }}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/gateway:latest

      - name: Deploy video-service to App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: app-flix-video-prod-${{ secrets.DEPLOYMENT_ID }}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/video-service:latest

      - name: Deploy history-service to App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: app-flix-history-prod-${{ secrets.DEPLOYMENT_ID }}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/history-service:latest

      - name: Deploy user-service to App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: app-flix-user-prod-${{ secrets.DEPLOYMENT_ID }}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/user-service:latest
