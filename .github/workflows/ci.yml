name: CI Pipeline

on:
  push:
    branches: [ 'main' ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd services/video-service && npm install || true
          cd ../../gateway && npm install || true
          cd ../../frontend && npm install || true

      - name: Build Docker images
        run: docker compose build
