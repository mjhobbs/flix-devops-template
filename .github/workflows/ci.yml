# Testing the github action secrets

name: CI/CD Pipeline

on:
  push:
    branches: [ 'main' ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd services/video-service && npm install || true
          cd ../../gateway && npm install || true
          cd ../../frontend && npm install || true

      - name: Build Docker images
        run: docker compose build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push gateway image
        uses: docker/build-push-action@v5
        with:
          context: ./gateway
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push video-service image
        uses: docker/build-push-action@v5
        with:
          context: ./services/video-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/video-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push history-service image
        uses: docker/build-push-action@v5
        with:
          context: ./services/history-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/history-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push user-service image
        uses: docker/build-push-action@v5
        with:
          context: ./services/user-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/user-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep infrastructure (Container Instances)
        uses: azure/cli@v1
        with:
          inlineScript: |
            az deployment sub create \
              --name flix-deploy-$(date +%s) \
              --location westus \
              --template-file infra/deploy.bicep \
              --parameters \
                environment=prod \
                containerRegistryUrl=ghcr.io \
                repositoryName=${{ github.repository }} \
                registryUsername=${{ github.actor }} \
                registryPassword='${{ secrets.GITHUB_TOKEN }}'

      - name: Retrieve deployment outputs
        uses: azure/cli@v1
        with:
          inlineScript: |
            RG_NAME=$(az deployment sub show \
              --name flix-deploy-$(date +%s) \
              --query properties.outputs.resourceGroupName.value -o tsv)
            echo "Resource Group: $RG_NAME"
            
            az container list \
              --resource-group $RG_NAME \
              --query "[].{Name:name,Ip:ipAddress.ip,Fqdn:ipAddress.fqdn}" \
              --output table
